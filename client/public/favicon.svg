<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#4F46E5"/>
  
  <!-- Scales of Justice (simplified) -->
  <g fill="#FFFFFF">
    <!-- Central pillar -->
    <rect x="30" y="18" width="4" height="30" rx="1"/>
    
    <!-- Base -->
    <rect x="22" y="46" width="20" height="3" rx="1.5"/>
    
    <!-- Horizontal beam -->
    <rect x="18" y="20" width="28" height="3" rx="1.5"/>
    
    <!-- Left pan -->
    <path d="M20 22 L16 30 L24 30 Z" opacity="0.9"/>
    <line x1="20" y1="22" x2="20" y2="30" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- Right pan -->
    <path d="M44 22 L40 30 L48 30 Z" opacity="0.9"/>
    <line x1="44" y1="22" x2="44" y2="30" stroke="#FFFFFF" stroke-width="1.5"/>
    
    <!-- AI Circuit accent (top right) -->
    <circle cx="50" cy="14" r="3" fill="#10B981" opacity="0.8"/>
    <circle cx="50" cy="14" r="1.5" fill="#FFFFFF"/>
  </g>
</svg>
